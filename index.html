<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考試系統</title>
<style>
body { font-family: Arial; padding:20px; }
.hidden { display:none; }
button { margin:5px; padding:8px 12px; }
#questionNav button { width:35px; margin:2px; }
.active { background:orange; color:#fff; }
.done { background:#4CAF50; color:#fff; }
</style>
</head>

<body>

<!-- 首頁 -->
<div id="menu">
<h1>📘 練習考試系統</h1>
<button onclick="startExam(50,60)">📝 考50題</button>
<button onclick="startExam(999,90)">📝 全部題目</button>
<button onclick="startStudy()">📖 學習模式</button>
<button onclick="retryWrong()">❌ 錯題再練習</button>
</div>

<!-- 考試 -->
<div id="exam" class="hidden">

<div>
<span id="progress"></span> |
<span id="timer"></span>
</div>

<div id="questionNav"></div>

<h2 id="question"></h2>
<div id="options"></div>

<button onclick="prevQuestion()">⬅ 上一題</button>
<button onclick="nextQuestion()">下一題 ➡</button>
<button onclick="submitExam()">📊 交卷</button>

</div>

<!-- 結果 -->
<div id="result" class="hidden">
<h2>📊 成績</h2>
<div id="score"></div>
<div id="list"></div>
<button onclick="location.reload()">重新開始</button>
</div>

<script src="script.js"></script>
</body>
</html>
