<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考試系統</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="menu">
    <h1>📘 練習考試系統</h1>
    <button onclick="startExam(50)">考50題（60分鐘）</button>
    <button onclick="startExam(999)">全部題目（90分鐘）</button>
    <button onclick="retryWrong()">錯題再練習</button>
</div>

<div id="exam" class="hidden">
    <div id="topBar">
        <span id="progress"></span>
        <span id="timer"></span>
    </div>

    <h2 id="question"></h2>
    <div id="options"></div>

    <button onclick="nextQuestion()">下一題</button>
</div>

<div id="result" class="hidden">
    <h2>結果</h2>
    <div id="score"></div>
    <div id="list"></div>
    <button onclick="location.reload()">重新開始</button>
</div>

<script src="script.js"></script>
</body>
</html>
